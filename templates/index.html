<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>えつこ鑑定 | ホロスコープ診断</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    background: #0a0a1a;
    color: #e8e0d0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1a 100%);
    z-index: -1;
  }
  .container {
    max-width: 560px;
    width: 100%;
  }
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header .symbol {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }
  h1 {
    font-size: 28px;
    font-weight: normal;
    letter-spacing: 0.2em;
    color: #c9b882;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 14px;
    color: #8880a0;
    letter-spacing: 0.1em;
  }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,184,130,0.2);
    border-radius: 16px;
    padding: 40px;
  }
  .form-group {
    margin-bottom: 28px;
  }
  label {
    display: block;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: #c9b882;
    margin-bottom: 10px;
  }
  input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(201,184,130,0.3);
    border-radius: 8px;
    padding: 14px 16px;
    color: #e8e0d0;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.3s;
  }
  input:focus {
    border-color: #c9b882;
    background: rgba(255,255,255,0.08);
  }
  .hint {
    font-size: 12px;
    color: #6660a0;
    margin-top: 6px;
  }
  .btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #c9b882, #a08040);
    border: none;
    border-radius: 8px;
    color: #0a0a1a;
    font-size: 16px;
    font-family: inherit;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: opacity 0.3s;
    margin-top: 8px;
  }
  .btn:hover { opacity: 0.85; }
  .error {
    background: rgba(255,80,80,0.1);
    border: 1px solid rgba(255,80,80,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 14px;
    color: #ff9090;
    margin-bottom: 24px;
  }
  .free-badge {
    text-align: center;
    font-size: 12px;
    color: #6660a0;
    margin-top: 20px;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="stars"></div>
<div class="container">
  <div class="header">
    <span class="symbol">✦</span>
    <h1>えつこ鑑定</h1>
    <p class="subtitle">西洋占星術 × 脳科学　あなたの設計図を読む</p>
  </div>

  <div class="card">
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/calculate">
      <div class="form-group">
        <label>生年月日</label>
        <input type="date" name="birth_date" required
               value="{{ request.form.birth_date if request.form else '' }}">
      </div>
      <div class="form-group">
        <label>出生時刻</label>
        <input type="time" name="birth_time" required
               value="{{ request.form.birth_time if request.form else '' }}">
        <p class="hint">母子手帳や出生届に記載の時刻をそのまま入力してください</p>
      </div>
      <div class="form-group">
        <label>出生場所</label>
        <input type="text" name="birth_place" placeholder="例：東京都渋谷区　/　大阪府大阪市" required>
        <p class="hint">市区町村レベルで入力すると精度が上がります</p>
      </div>
      <button type="submit" class="btn">ホロスコープを計算する</button>
    </form>
    <p class="free-badge">✦ 基本鑑定は無料です ✦</p>
  </div>
</div>
</body>
</html>
